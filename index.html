<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Tareas - DAW</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/output.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-indigo-500 to-pink-500 text-white text-center py-6 px-12">
        <h1 class="text-2xl font-bold mb-2">📝 TaskMaster</h1>
        <p class="text-sm">Tu gestor de tareas profesional</p>
        <!-- BOTÓN MODO OSCURO -->
        <button id="darkToggle" class="mt-3 px-4 py-2 bg-white text-indigo-600 font-semibold rounded-full text-sm hover:bg-indigo-100 transition-all duration-300">
            🌙 Modo oscuro
        </button>
    </header>

    <!-- ASIDE -->
    <aside class="dark:bg-gray-800 transition-colors duration-300">
        <nav>
            <h3>Menú</h3>
            <ul>
                <li><a href="#" class="active" data-filter="all">Todas las tareas</a></li>
                <li><a href="#" data-filter="high">Alta prioridad</a></li>
                <li><a href="#" data-filter="medium">Media prioridad</a></li>
                <li><a href="#" data-filter="low">Baja prioridad</a></li>
                <li><a href="#" data-filter="completed">Completadas</a></li>
            </ul>
            <div class="stats">
                <h4>Estadísticas</h4>
                <p>Total: <span id="total">0</span></p>
                <p>Completadas: <span id="done">0</span></p>
                <p>Pendientes: <span id="pending">0</span></p>
            </div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="dark:bg-gray-900 transition-colors duration-300">

        <!-- FORMULARIO -->
        <section class="add-task-form dark:bg-gray-800 transition-colors duration-300">
            <h2 class="dark:text-white">➕ Nueva Tarea</h2>
            <form id="taskForm">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Escribe una nueva tarea..."
                    required
                    class="focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-all duration-300 dark:bg-gray-700 dark:text-white dark:border-gray-600"
                />
                <select id="prioritySelect" class="focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-all duration-300 dark:bg-gray-700 dark:text-white">
                    <option value="high">🔴 Alta prioridad</option>
                    <option value="medium" selected>🟡 Media prioridad</option>
                    <option value="low">🟢 Baja prioridad</option>
                </select>
                <button type="submit" class="hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-all duration-300">
                    Añadir Tarea
                </button>
            </form>
            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Buscar tareas..."
                class="focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-all duration-300 dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />
            
            <button onclick="document.getElementById('searchInput').value=''; renderizarTodas(tareas)" 
                style="margin-top:0.5rem; padding:4px 12px; background:#6366f1; color:white; border:none; border-radius:8px; cursor:pointer;">
                ✖ Limpiar búsqueda
            </button>
        </section>
        </section>

        <!-- LISTA DE TAREAS -->
        <<section class="task-list">
    <h2 class="dark:text-white">Mis Tareas</h2>

    <!-- AÑADE ESTO -->
    <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
        <button id="btnCompletarTodas" style="padding: 0.5rem 1rem; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">
            ✅ Marcar todas
        </button>
        <button id="btnBorrarCompletadas" style="padding: 0.5rem 1rem; background: #ef4444; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">
            🗑️ Borrar completadas
        </button>
    </div>
<p id="contadorFiltro" style="color:#6b7280; margin-bottom:1rem;"></p>
    <div id="taskList"></div>
</section>
    </main>

    <script src="js/app.js"></script>

</body>
</html>
